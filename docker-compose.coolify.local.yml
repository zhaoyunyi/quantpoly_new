services:
  postgres:
    ports:
      - "15432:5432"

  backend:
    ports:
      - "18000:8000"
    environment:
      BACKEND_CORS_ALLOWED_ORIGINS: http://localhost:13000
      USER_AUTH_COOKIE_SECURE: "false"
      USER_AUTH_COOKIE_SAMESITE: lax

  frontend:
    build:
      args:
        VITE_BACKEND_ORIGIN: http://localhost:18000
    ports:
      - "13000:3000"
