name: Verify Coolify Local Stack

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/frontend_web/**"
      - "docker/frontend.prod.Dockerfile"
      - "docker/backend.prod.Dockerfile"
      - "docker-compose.coolify.yml"
      - "docker-compose.coolify.local.yml"
      - "scripts/verify_coolify_local_stack.py"
      - "apps/frontend_web/package-lock.json"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "apps/frontend_web/package-lock.json"

      - name: Install Frontend Dependencies
        working-directory: apps/frontend_web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: apps/frontend_web
        run: npx playwright install --with-deps chromium

      - name: Verify Coolify Local Stack
        run: python scripts/verify_coolify_local_stack.py
